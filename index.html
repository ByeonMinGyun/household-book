<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>가계부</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-appearance:none;appearance:none}
a,button,input,select,textarea{font-family:'Pretendard',sans-serif;background:none;border:none;outline:none;-webkit-tap-highlight-color:transparent}
button{cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
html,body{height:100%;font-family:'Pretendard',sans-serif;background:#f0f2f8;overflow:hidden}
:root{
  --bg:#ffffff;--bg2:#f0f2f8;--bg3:#e8ebf4;
  --blue:#4361ee;--text:#0d0f1a;--text2:#5a607a;--text3:#9ba3bf;
  --income:#4361ee;--expense:#ff5c7c;--fixed:#0d0f1a;--savings:#00b894;
  --border:#e4e8f5;--shadow:0 2px 14px rgba(67,97,238,0.09);
}
.app{width:100%;height:100%;max-width:430px;margin:0 auto;background:var(--bg2);position:relative;overflow:hidden}
.main{position:absolute;inset:0;overflow:hidden;display:flex;flex-direction:column;transition:filter 0.3s ease}
.main.blurred{filter:blur(3px) brightness(0.85)}
.header{padding:env(safe-area-inset-top,44px) 18px 12px;display:flex;align-items:center;justify-content:space-between;background:var(--bg2);flex-shrink:0}
.month-nav{display:flex;align-items:center;gap:4px}
.month-title{font-size:24px;font-weight:700;color:var(--text)}
.nav-btn{font-size:14px;color:var(--text3);padding:4px 8px;border-radius:6px}
.nav-btn:hover{background:var(--bg3)}
.header-icons{display:flex;align-items:center;gap:4px}
.hicon{width:38px;height:38px;border-radius:10px;font-size:18px;color:var(--text2)}
.hicon:hover{background:var(--bg3)}
.summary{margin:0 14px 10px;background:var(--bg);border-radius:18px;padding:12px 6px;display:grid;grid-template-columns:repeat(4,1fr);box-shadow:var(--shadow);flex-shrink:0}
.sum-item{text-align:center;cursor:pointer;padding:4px 2px;border-radius:10px;position:relative}
.sum-item:not(:last-child)::after{content:'';position:absolute;right:0;top:15%;height:70%;width:1px;background:var(--border)}
.sum-item:hover{background:var(--bg2)}
.sum-label{font-size:10px;color:var(--text3);margin-bottom:3px;font-weight:500}
.sum-value{font-size:11px;font-weight:700}
.sum-value.income{color:var(--income)}
.sum-value.expense{color:var(--expense)}
.sum-value.fixed{color:var(--fixed)}
.sum-value.savings{color:var(--savings)}
.cal-card{margin:0 14px 14px;background:var(--bg);border-radius:18px;padding:12px 8px;box-shadow:var(--shadow);flex:1;display:flex;flex-direction:column;min-height:0}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px;flex-shrink:0}
.cal-day-name{text-align:center;font-size:11px;font-weight:600;color:var(--text3);padding:2px 0}
.cal-day-name.sun{color:var(--expense)}.cal-day-name.sat{color:var(--blue)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);flex:1;align-content:start}
.cal-cell{padding:3px 1px;border-radius:8px;-webkit-user-select:none;user-select:none}
.cal-cell.has-data{cursor:pointer}
.cal-cell.clickable{cursor:pointer}
.cal-cell.clickable:active{background:var(--bg2)}
.cal-cell.empty{cursor:default}
.cal-cell.today .date-num{background:var(--blue);color:#fff;border-radius:50%}
.date-num{font-size:12px;color:var(--text);width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin:0 auto;font-weight:500}
.date-num.sun{color:var(--expense)}.date-num.sat{color:var(--blue)}
.cell-amount{font-size:8px;text-align:center;margin-top:2px;line-height:1.4}
.cell-amount .neg{color:var(--expense)}.cell-amount .pos{color:var(--income)}
.fab{position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 44px);right:20px;width:52px;height:52px;background:var(--blue);border-radius:50%;color:#fff;font-size:28px;z-index:5;box-shadow:0 4px 20px rgba(67,97,238,0.4)}
.dash-dim{position:absolute;top:0;left:0;right:0;height:130px;background:rgba(240,242,248,0);z-index:9;pointer-events:none;transition:background 0.3s ease}
.dash-dim.active{background:rgba(240,242,248,0.6)}
.backdrop{display:none;position:absolute;inset:0;background:rgba(13,15,26,0.3);z-index:10}
.backdrop.open{display:block}
.sheet{position:absolute;bottom:-110%;left:0;right:0;background:var(--bg);border-radius:24px 24px 0 0;z-index:11;transition:bottom 0.3s cubic-bezier(.4,0,.2,1);min-height:70%}
.sheet.open{bottom:0}
.sheet.closing{bottom:-110%;transition:bottom 0.3s cubic-bezier(.4,0,.2,1)}
.sheet-inner{padding:12px 20px calc(env(safe-area-inset-bottom,0px) + 80px);overflow-y:auto;max-height:75vh}
.sheet-top{padding:0}
.handle{width:40px;height:4px;background:var(--bg3);border-radius:2px;margin:0 auto 16px}
.title-row{display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:18px}
.back-btn{position:absolute;left:0;font-size:22px;color:var(--blue);display:none;line-height:1}
.sheet-title{font-size:17px;font-weight:600;color:var(--text);text-align:center}

/* 세부 내역 바텀시트 안 FAB */
.sheet-fab{position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 20px);right:20px;width:46px;height:46px;background:var(--blue);border-radius:50%;color:#fff;font-size:24px;z-index:12;box-shadow:0 4px 16px rgba(67,97,238,0.38)}

.tx-item{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--bg3);cursor:pointer}
.tx-item:last-child{border-bottom:none}
.tx-item:active{opacity:0.7}
.tx-left{display:flex;align-items:center;gap:12px}
.tx-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tx-dot.income{background:var(--income)}.tx-dot.expense{background:var(--expense)}.tx-dot.fixed_expense{background:var(--fixed)}.tx-dot.savings{background:var(--savings)}
.tx-desc{font-size:14px;font-weight:500;color:var(--text)}
.tx-cat{font-size:11px;color:var(--text3);margin-top:2px}
.tx-amount{font-size:14px;font-weight:600;white-space:nowrap}
.tx-amount.expense{color:var(--expense)}.tx-amount.income{color:var(--income)}.tx-amount.savings{color:var(--savings)}.tx-amount.fixed_expense{color:var(--fixed)}
.type-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:16px}
.type-tab{padding:10px 2px;border:1.5px solid var(--border);border-radius:12px;font-size:12px;text-align:center;color:var(--text2);font-weight:500;transition:all 0.15s}
.type-tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;color:var(--text3);font-weight:500;margin-bottom:6px;display:block}
.form-group select,.form-group input{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:15px;background:var(--bg2);color:var(--text)}
.form-group select:focus,.form-group input:focus{border-color:var(--blue);background:var(--bg)}
.submit-btn{width:100%;padding:16px;background:var(--blue);color:#fff;border-radius:14px;font-size:16px;font-weight:600;box-shadow:0 4px 16px rgba(67,97,238,0.3);margin-top:6px;text-align:center;display:block}
.stat-bar-item{margin-bottom:14px;cursor:pointer;padding:8px;border-radius:12px;transition:background 0.15s}
.stat-bar-item:hover{background:var(--bg3)}
.stat-row{display:flex;justify-content:space-between;margin-bottom:6px;align-items:center}
.stat-label{font-size:13px;color:var(--text);font-weight:500}
.stat-pct{font-size:11px;color:var(--blue);font-weight:600;background:#eef0fd;padding:2px 7px;border-radius:20px;margin-left:6px}
.stat-amt{font-size:13px;color:var(--text2);font-weight:500}
.bar-track{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;background:var(--blue);border-radius:3px}
.stat-total{text-align:right;font-size:13px;color:var(--text2);margin-top:16px;padding-top:14px;border-top:1px solid var(--bg3)}
.stat-total span{color:var(--expense);font-weight:600}

/* 수정/삭제 액션시트 — 여백 추가 */
.action-sheet{position:absolute;bottom:-110%;left:0;right:0;background:var(--bg);border-radius:24px 24px 0 0;z-index:20;transition:bottom 0.3s cubic-bezier(.4,0,.2,1);padding:16px 24px calc(env(safe-area-inset-bottom,0px)+36px)}
.action-sheet.open{bottom:0}
.action-sheet.closing{bottom:-110%;transition:bottom 0.3s cubic-bezier(.4,0,.2,1)}
.action-title{font-size:14px;color:var(--text3);text-align:center;margin-bottom:20px;font-weight:500;padding:0 8px}
.action-btn{width:100%;padding:16px;border:1.5px solid var(--border);border-radius:14px;font-size:15px;background:var(--bg);color:var(--text);margin-bottom:12px;text-align:center;font-weight:500;transition:background 0.15s}
.action-btn.danger{color:var(--expense);border-color:#ffd6e0}
.action-btn:hover{background:var(--bg3)}

/* 수정 시트 — 여백 추가 */
.edit-sheet{position:absolute;bottom:-110%;left:0;right:0;background:var(--bg);border-radius:24px 24px 0 0;z-index:22;transition:bottom 0.3s cubic-bezier(.4,0,.2,1);min-height:55%}
.edit-sheet.open{bottom:0}
.edit-sheet.closing{bottom:-110%;transition:bottom 0.3s cubic-bezier(.4,0,.2,1)}
.edit-inner{padding:16px 24px calc(env(safe-area-inset-bottom,0px)+36px);overflow-y:auto;max-height:70vh}

/* 검색 오버레이 — 좌우 여백 추가 */
.search-overlay{display:none;position:absolute;inset:0;background:var(--bg);z-index:15;padding:calc(env(safe-area-inset-top,20px)+16px) 20px 20px}
.search-overlay.open{display:block}
.search-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.search-input{flex:1;padding:12px 16px;border:1.5px solid var(--border);border-radius:12px;font-size:15px;background:var(--bg2);color:var(--text)}
.search-input:focus{border-color:var(--blue);background:var(--bg)}
.search-cancel{font-size:15px;color:var(--blue);white-space:nowrap;font-weight:500;padding:4px 2px;flex-shrink:0}
.search-results{overflow-y:auto;max-height:calc(100vh - 120px);padding:0 2px}
.search-empty{text-align:center;color:var(--text3);font-size:13px;padding:60px 0}
.empty-msg{text-align:center;color:var(--text3);font-size:13px;padding:32px 0}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;z-index:99;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;font-weight:500}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="main" id="mainScreen">
    <div class="header">
      <div class="month-nav">
        <button class="nav-btn" id="prevM">‹</button>
        <span class="month-title" id="mTitle"></span>
        <button class="nav-btn" id="nextM">›</button>
      </div>
      <div class="header-icons">
        <button class="hicon" id="searchBtn">🔍</button>
        <button class="hicon" id="statsBtn">📊</button>
        <button class="hicon" id="navHome">📅</button>
      </div>
    </div>
    <div class="summary">
      <div class="sum-item" id="dash-income"><div class="sum-label">수입</div><div class="sum-value income" id="sIncome">0원</div></div>
      <div class="sum-item" id="dash-expense"><div class="sum-label">지출</div><div class="sum-value expense" id="sExpense">0원</div></div>
      <div class="sum-item" id="dash-fixed"><div class="sum-label">고정지출</div><div class="sum-value fixed" id="sFixed">0원</div></div>
      <div class="sum-item" id="dash-savings"><div class="sum-label">저축</div><div class="sum-value savings" id="sSavings">0원</div></div>
    </div>
    <div class="cal-card">
      <div class="cal-header">
        <div class="cal-day-name sun">일</div><div class="cal-day-name">월</div><div class="cal-day-name">화</div>
        <div class="cal-day-name">수</div><div class="cal-day-name">목</div><div class="cal-day-name">금</div>
        <div class="cal-day-name sat">토</div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>

  <button class="fab" id="fabBtn">+</button>
  <div class="dash-dim" id="dashDim"></div>
  <div class="backdrop" id="backdrop"></div>

  <!-- 세부 내역 시트 -->
  <div class="sheet" id="detailSheet">
    <div class="sheet-inner">
      <div class="sheet-top">
        <div class="handle"></div>
        <div class="title-row">
          <button class="back-btn" id="detailBackBtn">‹</button>
          <div class="sheet-title" id="detailTitle"></div>
        </div>
      </div>
      <div id="detailList"></div>
    </div>
    <button class="sheet-fab" id="detailFabBtn">+</button>
  </div>

  <!-- 기록 시트 -->
  <div class="sheet" id="addSheet">
    <div class="sheet-inner">
      <div class="sheet-top">
        <div class="handle"></div>
        <div class="title-row"><div class="sheet-title">내역 기록하기</div></div>
      </div>
      <div class="type-tabs">
        <div class="type-tab active" data-type="income">수입</div>
        <div class="type-tab" data-type="expense">지출</div>
        <div class="type-tab" data-type="fixed_expense">고정지출</div>
        <div class="type-tab" data-type="savings">저축</div>
      </div>
      <div class="form-group" id="catGroup" style="display:none">
        <label class="form-label">카테고리</label>
        <select id="catInput"><option value="">분류 선택</option><option>식비</option><option>쇼핑</option><option>생필품</option><option>문화</option><option>주유비</option><option>교통/차량</option><option>의료비</option><option>경조사/선물</option><option>여행</option><option>숙박</option><option>기타</option></select>
      </div>
      <div class="form-group"><label class="form-label">금액</label><input type="text" id="amtInput" placeholder="0" inputmode="numeric"></div>
      <div class="form-group"><label class="form-label">내용</label><input type="text" id="descInput" placeholder="어디에 썼나요?"></div>
      <div class="form-group"><label class="form-label">날짜</label><input type="date" id="dateInput"></div>
      <button class="submit-btn" id="submitBtn">기록하기</button>
    </div>
  </div>

  <!-- 통계 시트 -->
  <div class="sheet" id="statsSheet">
    <div class="sheet-inner">
      <div class="sheet-top">
        <div class="handle"></div>
        <div class="title-row"><div class="sheet-title" id="statsTitle"></div></div>
      </div>
      <div id="statContent"></div>
    </div>
  </div>

  <!-- 액션 시트 -->
  <div class="action-sheet" id="actionSheet">
    <div class="handle" style="margin:0 auto 16px"></div>
    <div class="action-title" id="actionTitle"></div>
    <button class="action-btn" id="editBtn">수정하기</button>
    <button class="action-btn danger" id="deleteBtn">삭제하기</button>
    <button class="action-btn" id="actionCancelBtn">취소</button>
  </div>

  <!-- 수정 시트 -->
  <div class="edit-sheet" id="editSheet">
    <div class="edit-inner">
      <div class="sheet-top">
        <div class="handle"></div>
        <div class="title-row"><div class="sheet-title">내역 수정하기</div></div>
      </div>
      <div class="form-group" id="editCatGroup"><label class="form-label">카테고리</label>
        <select id="editCatInput"><option value="">분류 선택</option><option>식비</option><option>쇼핑</option><option>생필품</option><option>문화</option><option>주유비</option><option>교통/차량</option><option>의료비</option><option>경조사/선물</option><option>여행</option><option>숙박</option><option>기타</option></select>
      </div>
      <div class="form-group"><label class="form-label">금액</label><input type="text" id="editAmtInput" placeholder="0" inputmode="numeric"></div>
      <div class="form-group"><label class="form-label">내용</label><input type="text" id="editDescInput" placeholder="내용"></div>
      <div class="form-group"><label class="form-label">날짜</label><input type="date" id="editDateInput"></div>
      <button class="submit-btn" id="editSubmitBtn">수정 완료</button>
    </div>
  </div>

  <div class="backdrop" id="editBackdrop" style="z-index:19;display:none"></div>

  <!-- 검색 오버레이 -->
  <div class="search-overlay" id="searchOverlay">
    <div class="search-bar">
      <input class="search-input" id="searchInput" placeholder="내역 검색...">
      <button class="search-cancel" id="searchCancel">취소</button>
    </div>
    <div class="search-results" id="searchResults"><div class="search-empty">검색어를 입력해주세요</div></div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
const SUPABASE_URL='https://mqqpuhpjvhqbicnlycrh.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xcXB1aHBqdmhxYmljbmx5Y3JoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NTg5NTEsImV4cCI6MjA5MjMzNDk1MX0.eDwMcmTl861SLHZLSnyWbVDoI87cWw_aI3onj99F37s';

const now=new Date();
let year=now.getFullYear(),month=now.getMonth();
let selType='income',selectedTxId=null,prevSheet=null;
let txs=[];
let currentDetailDate=null; // 현재 열린 날짜 저장
const fmt=n=>Math.abs(n).toLocaleString('ko-KR')+'원';
const pd=n=>String(n).padStart(2,'0');
const typeLabel={income:'수입',expense:'지출',fixed_expense:'고정지출',savings:'저축'};

async function loadData(){
  try{
    const r=await fetch(SUPABASE_URL+'/rest/v1/transactions?order=date.asc&limit=1000',{
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    txs=await r.json();
  }catch(e){console.error(e);}
  render();
}

async function saveData(data){
  const r=await fetch(SUPABASE_URL+'/rest/v1/transactions',{
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
    body:JSON.stringify(data)
  });
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}

async function updateData(id,data){
  const r=await fetch(SUPABASE_URL+'/rest/v1/transactions?id=eq.'+id,{
    method:'PATCH',
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'},
    body:JSON.stringify(data)
  });
  if(!r.ok)throw new Error(await r.text());
}

async function deleteData(id){
  await fetch(SUPABASE_URL+'/rest/v1/transactions?id=eq.'+id,{
    method:'DELETE',
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
  });
}

function monthTxs(){return txs.filter(t=>{const d=new Date(t.date);return d.getFullYear()===year&&d.getMonth()===month;});}

function render(){
  const mt=monthTxs();
  const sum=type=>mt.filter(t=>t.type===type).reduce((s,t)=>s+t.amount,0);
  document.getElementById('mTitle').textContent=(month+1)+'월';
  document.getElementById('sIncome').textContent=fmt(sum('income'));
  document.getElementById('sExpense').textContent=fmt(sum('expense'));
  document.getElementById('sFixed').textContent=fmt(sum('fixed_expense'));
  document.getElementById('sSavings').textContent=fmt(sum('savings'));
  renderCal();
}

function renderCal(){
  const g=document.getElementById('calGrid');g.innerHTML='';
  const first=new Date(year,month,1).getDay();
  const days=new Date(year,month+1,0).getDate();
  const weeks=Math.ceil((first+days)/7);
  const today=new Date();
  g.style.gridTemplateRows=`repeat(${weeks},1fr)`;

  for(let i=0;i<first;i++){
    const c=document.createElement('div');c.className='cal-cell empty';g.appendChild(c);
  }
  for(let d=1;d<=days;d++){
    const c=document.createElement('div');
    c.className='cal-cell clickable';
    const dow=(first+d-1)%7;
    if(today.getFullYear()===year&&today.getMonth()===month&&today.getDate()===d)c.classList.add('today');

    const dn=document.createElement('div');
    dn.className='date-num'+(dow===0?' sun':dow===6?' sat':'');
    dn.textContent=d;c.appendChild(dn);

    const ds=year+'-'+pd(month+1)+'-'+pd(d);
    const dayTx=txs.filter(t=>t.date===ds);

    if(dayTx.length){
      c.classList.add('has-data');
      const inc=dayTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
      const out=dayTx.filter(t=>t.type!=='income').reduce((s,t)=>s+t.amount,0);
      const a=document.createElement('div');a.className='cell-amount';
      if(inc){const s=document.createElement('div');s.className='pos';s.textContent='+'+inc.toLocaleString('ko-KR');a.appendChild(s);}
      if(out){const s=document.createElement('div');s.className='neg';s.textContent='-'+out.toLocaleString('ko-KR');a.appendChild(s);}
      c.appendChild(a);
    }

    // 터치 감도 개선 — touchstart/touchend로 정확한 탭만 인식
    let touchStartX=0,touchStartY=0,touchStartTime=0;
    c.addEventListener('touchstart',e=>{
      touchStartX=e.touches[0].clientX;
      touchStartY=e.touches[0].clientY;
      touchStartTime=Date.now();
    },{passive:true});
    c.addEventListener('touchend',e=>{
      const dx=Math.abs(e.changedTouches[0].clientX-touchStartX);
      const dy=Math.abs(e.changedTouches[0].clientY-touchStartY);
      const dt=Date.now()-touchStartTime;
      // 이동거리 10px 이하 & 300ms 이하일 때만 클릭으로 인식
      if(dx<10&&dy<10&&dt<300){
        e.preventDefault();
        showDetail(d+'일 세부 내역',dayTx,null,ds);
      }
    },{passive:false});

    // 마우스 클릭 (PC)
    c.addEventListener('click',()=>{
      showDetail(d+'일 세부 내역',dayTx,null,ds);
    });

    g.appendChild(c);
  }
}

function setBlur(on){
  document.getElementById('mainScreen').classList.toggle('blurred',on);
  document.getElementById('dashDim').classList.toggle('active',on);
  document.getElementById('backdrop').classList.toggle('open',on);
}

function openSheet(id,fromSheet=null){
  prevSheet=fromSheet;
  document.querySelectorAll('.sheet').forEach(s=>{
    if(s.id!==id){
      s.classList.remove('open');
      s.classList.remove('closing');
    }
  });
  setBlur(true);
  const inner=document.getElementById(id).querySelector('.sheet-inner,.edit-inner');
  if(inner)inner.scrollTop=0;
  setTimeout(()=>document.getElementById(id).classList.add('open'),10);
  const bb=document.getElementById('detailBackBtn');
  if(bb)bb.style.display=fromSheet?'inline-flex':'none';
}

function closeSheet(el){
  // 중복 닫힘 방지 — 한 번에 깔끔하게
  if(!el.classList.contains('open'))return;
  el.classList.remove('open');
}

function closeAll(){
  document.querySelectorAll('.sheet,.action-sheet,.edit-sheet').forEach(s=>{
    s.classList.remove('open');
  });
  setBlur(false);
  document.getElementById('editBackdrop').classList.remove('open');
  document.getElementById('editBackdrop').style.display='none';
  prevSheet=null;
  currentDetailDate=null;
}

function makeTxList(txList,listEl){
  if(!txList.length){
    listEl.innerHTML='<div class="empty-msg">내역이 없어요</div>';
    return;
  }
  listEl.innerHTML='';
  txList.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(t=>{
    const item=document.createElement('div');item.className='tx-item';
    item.innerHTML=`<div class="tx-left"><div class="tx-dot ${t.type}"></div><div><div class="tx-desc">${t.description||'-'}</div><div class="tx-cat">${t.date.slice(5).replace('-','/')}일 · ${t.category||typeLabel[t.type]}</div></div></div><div class="tx-amount ${t.type}">${fmt(t.amount)}</div>`;
    item.addEventListener('click',()=>showAction(t));
    listEl.appendChild(item);
  });
}

function showDetail(title,txList,fromSheet,dateStr){
  currentDetailDate=dateStr||null;
  document.getElementById('detailTitle').textContent=title;
  makeTxList(txList,document.getElementById('detailList'));
  openSheet('detailSheet',fromSheet);
}

function showDashDetail(type){
  const labels={income:'수입 내역',expense:'지출 내역',fixed_expense:'고정지출 내역',savings:'저축 내역'};
  const mt=monthTxs().filter(t=>t.type===type).sort((a,b)=>a.date.localeCompare(b.date));
  showDetail((month+1)+'월 '+labels[type],mt,null,null);
}

function showStats(){
  const mt=monthTxs();
  const expenses=mt.filter(t=>t.type==='expense'||t.type==='fixed_expense');
  const total=expenses.reduce((s,t)=>s+t.amount,0);
  const cats={};
  expenses.forEach(t=>{const k=t.category||(t.type==='fixed_expense'?'고정지출':'기타');cats[k]=(cats[k]||0)+t.amount;});
  const sorted=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  document.getElementById('statsTitle').textContent=(month+1)+'월 지출 분석';
  const cont=document.getElementById('statContent');cont.innerHTML='';
  if(!sorted.length){cont.innerHTML='<div class="empty-msg">지출 내역이 없어요</div>';openSheet('statsSheet',null);return;}
  sorted.forEach(([cat,amt])=>{
    const pct=Math.round(amt/total*100);
    const el=document.createElement('div');el.className='stat-bar-item';
    el.innerHTML=`<div class="stat-row"><span class="stat-label">${cat}<span class="stat-pct">${pct}%</span></span><span class="stat-amt">${fmt(amt)}</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>`;
    el.addEventListener('click',()=>{
      const catTxs=monthTxs().filter(t=>t.category===cat||(cat==='고정지출'&&t.type==='fixed_expense'&&!t.category)).sort((a,b)=>a.date.localeCompare(b.date));
      showDetail(cat+' 내역',catTxs,'statsSheet',null);
    });
    cont.appendChild(el);
  });
  const te=document.createElement('div');te.className='stat-total';te.innerHTML=`총 지출 합계: <span>${fmt(total)}</span>`;cont.appendChild(te);
  openSheet('statsSheet',null);
}

document.getElementById('detailBackBtn').addEventListener('click',()=>{
  closeSheet(document.getElementById('detailSheet'));
  if(prevSheet){
    setTimeout(()=>{
      document.getElementById(prevSheet).classList.add('open');
      document.getElementById('detailBackBtn').style.display='none';
      prevSheet=null;
    },10);
  }
});

// 세부 내역 바텀시트 안 + 버튼
document.getElementById('detailFabBtn').addEventListener('click',()=>{
  openAddSheet(currentDetailDate);
});

function openAddSheet(dateStr){
  selType='income';
  document.querySelectorAll('.type-tab').forEach(t=>t.classList.toggle('active',t.dataset.type==='income'));
  document.getElementById('catGroup').style.display='none';
  document.getElementById('amtInput').value='';
  document.getElementById('descInput').value='';
  document.getElementById('catInput').value='';
  document.getElementById('dateInput').value=dateStr||now.toISOString().split('T')[0];
  openSheet('addSheet',currentDetailDate?'detailSheet':null);
}

function showAction(tx){
  document.getElementById('actionTitle').textContent=`${tx.description||'-'} · ${fmt(tx.amount)}`;
  selectedTxId=tx.id;
  document.getElementById('editBackdrop').style.display='block';
  setTimeout(()=>{
    document.getElementById('editBackdrop').classList.add('open');
    document.getElementById('actionSheet').classList.add('open');
  },10);
}

function closeAction(){
  closeSheet(document.getElementById('actionSheet'));
  closeSheet(document.getElementById('editSheet'));
  document.getElementById('editBackdrop').classList.remove('open');
  setTimeout(()=>document.getElementById('editBackdrop').style.display='none',300);
}

document.getElementById('editBtn').addEventListener('click',()=>{
  const tx=txs.find(t=>t.id===selectedTxId);if(!tx)return;
  document.getElementById('editAmtInput').value=tx.amount.toLocaleString('ko-KR');
  document.getElementById('editDescInput').value=tx.description||'';
  document.getElementById('editDateInput').value=tx.date;
  document.getElementById('editCatInput').value=tx.category||'';
  document.getElementById('editCatGroup').style.display=tx.type==='expense'?'block':'none';
  closeSheet(document.getElementById('actionSheet'));
  setTimeout(()=>document.getElementById('editSheet').classList.add('open'),10);
});

document.getElementById('deleteBtn').addEventListener('click',async()=>{
  try{
    await deleteData(selectedTxId);
    txs=txs.filter(t=>t.id!==selectedTxId);
    closeAction();
    // 세부 내역 시트가 열려 있으면 목록 갱신
    if(document.getElementById('detailSheet').classList.contains('open')&&currentDetailDate){
      const dayTx=txs.filter(t=>t.date===currentDetailDate);
      makeTxList(dayTx,document.getElementById('detailList'));
    }
    render();showToast('삭제되었습니다');
  }catch(e){showToast('삭제 실패');}
});

document.getElementById('actionCancelBtn').addEventListener('click',closeAction);
document.getElementById('editBackdrop').addEventListener('click',closeAction);

document.getElementById('editSubmitBtn').addEventListener('click',async()=>{
  const tx=txs.find(t=>t.id===selectedTxId);if(!tx)return;
  const amount=parseInt(document.getElementById('editAmtInput').value.replace(/,/g,''));
  if(!amount||amount<=0){showToast('금액을 입력해주세요');return;}
  const updData={amount,description:document.getElementById('editDescInput').value.trim(),date:document.getElementById('editDateInput').value};
  if(tx.type==='expense')updData.category=document.getElementById('editCatInput').value;
  try{
    await updateData(selectedTxId,updData);
    Object.assign(tx,updData);
    closeAction();
    if(document.getElementById('detailSheet').classList.contains('open')&&currentDetailDate){
      const dayTx=txs.filter(t=>t.date===currentDetailDate);
      makeTxList(dayTx,document.getElementById('detailList'));
    }
    render();showToast('✓ 수정되었습니다');
  }catch(e){showToast('수정 실패');}
});

function fmtInput(el){
  el.addEventListener('input',()=>{
    const raw=el.value.replace(/,/g,'').replace(/\D/g,'');
    el.value=raw?parseInt(raw).toLocaleString('ko-KR'):'';
  });
}
fmtInput(document.getElementById('amtInput'));
fmtInput(document.getElementById('editAmtInput'));

document.getElementById('searchBtn').addEventListener('click',()=>{
  document.getElementById('searchOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('searchInput').focus(),100);
});
document.getElementById('searchCancel').addEventListener('click',()=>{
  document.getElementById('searchOverlay').classList.remove('open');
  document.getElementById('searchInput').value='';
  document.getElementById('searchResults').innerHTML='<div class="search-empty">검색어를 입력해주세요</div>';
});
document.getElementById('searchInput').addEventListener('input',()=>{
  const q=document.getElementById('searchInput').value.trim();
  const res=document.getElementById('searchResults');
  if(!q){res.innerHTML='<div class="search-empty">검색어를 입력해주세요</div>';return;}
  const found=txs.filter(t=>(t.description||'').includes(q)||(t.category||'').includes(q));
  if(!found.length){res.innerHTML='<div class="search-empty">검색 결과가 없어요</div>';return;}
  res.innerHTML='';
  found.sort((a,b)=>a.date.localeCompare(b.date)).forEach(t=>{
    const item=document.createElement('div');item.className='tx-item';
    item.innerHTML=`<div class="tx-left"><div class="tx-dot ${t.type}"></div><div><div class="tx-desc">${t.description||'-'}</div><div class="tx-cat">${t.date.slice(0,7).replace('-','/')} · ${t.category||typeLabel[t.type]}</div></div></div><div class="tx-amount ${t.type}">${fmt(t.amount)}</div>`;
    res.appendChild(item);
  });
});

document.getElementById('navHome').addEventListener('click',()=>{year=now.getFullYear();month=now.getMonth();render();closeAll();});
document.getElementById('statsBtn').addEventListener('click',showStats);
document.getElementById('fabBtn').addEventListener('click',()=>openAddSheet(null));

document.querySelectorAll('.type-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.type-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');selType=tab.dataset.type;
    document.getElementById('catGroup').style.display=selType==='expense'?'block':'none';
  });
});

document.getElementById('submitBtn').addEventListener('click',async()=>{
  const amount=parseInt(document.getElementById('amtInput').value.replace(/,/g,''));
  const desc=document.getElementById('descInput').value.trim();
  const date=document.getElementById('dateInput').value;
  const category=document.getElementById('catInput').value;
  if(!amount||amount<=0){showToast('금액을 입력해주세요');return;}
  if(!date){showToast('날짜를 선택해주세요');return;}
  if(selType==='expense'&&!category){showToast('카테고리를 선택해주세요');return;}
  const btn=document.getElementById('submitBtn');
  btn.textContent='저장 중...';btn.disabled=true;
  try{
    const res=await saveData({type:selType,amount,description:desc,date,category:selType==='expense'?category:null});
    const newTx=Array.isArray(res)?res[0]:res;
    txs.push(newTx);
    // 세부 내역 시트에서 추가했으면 목록 갱신
    if(prevSheet==='detailSheet'&&currentDetailDate&&date===currentDetailDate){
      const dayTx=txs.filter(t=>t.date===currentDetailDate);
      makeTxList(dayTx,document.getElementById('detailList'));
      closeSheet(document.getElementById('addSheet'));
      document.getElementById('detailSheet').classList.add('open');
    } else {
      closeAll();
    }
    render();showToast('✓ 기록되었습니다');
  }catch(e){showToast('저장 실패: '+e.message);}
  finally{btn.textContent='기록하기';btn.disabled=false;}
});

document.getElementById('backdrop').addEventListener('click',closeAll);
document.getElementById('dash-income').addEventListener('click',()=>showDashDetail('income'));
document.getElementById('dash-expense').addEventListener('click',()=>showDashDetail('expense'));
document.getElementById('dash-fixed').addEventListener('click',()=>showDashDetail('fixed_expense'));
document.getElementById('dash-savings').addEventListener('click',()=>showDashDetail('savings'));
document.getElementById('prevM').addEventListener('click',()=>{month--;if(month<0){month=11;year--;}render();});
document.getElementById('nextM').addEventListener('click',()=>{month++;if(month>11){month=0;year++;}render();});

// 캘린더 스와이프 (좌우)
let swipeStartX=0,swipeStartY=0;
document.getElementById('mainScreen').addEventListener('touchstart',e=>{
  swipeStartX=e.touches[0].clientX;
  swipeStartY=e.touches[0].clientY;
},{passive:true});
document.getElementById('mainScreen').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-swipeStartX;
  const dy=Math.abs(e.changedTouches[0].clientY-swipeStartY);
  if(Math.abs(dx)>60&&dy<30){
    dx<0?(month++,month>11&&(month=0,year++)):(month--,month<0&&(month=11,year--));
    render();
  }
},{passive:true});

// 바텀시트 아래로 드래그해서 닫기 — 중복 방지
document.querySelectorAll('.sheet,.action-sheet,.edit-sheet').forEach(sheet=>{
  let sy=0,dragging=false,moved=false;
  sheet.addEventListener('touchstart',e=>{
    const inner=e.target.closest('.sheet-inner,.edit-inner');
    if(inner&&inner.scrollTop>0){dragging=false;return;}
    sy=e.touches[0].clientY;
    dragging=true;
    moved=false;
    sheet.style.transition='none';
  },{passive:true});
  sheet.addEventListener('touchmove',e=>{
    if(!dragging)return;
    const dy=e.touches[0].clientY-sy;
    if(dy>0){
      moved=true;
      sheet.style.transform=`translateY(${dy}px)`;
    }
  },{passive:true});
  sheet.addEventListener('touchend',e=>{
    if(!dragging)return;
    dragging=false;
    sheet.style.transition='';
    const dy=e.changedTouches[0].clientY-sy;
    if(moved&&dy>80){
      sheet.style.transform='';
      closeAll();
    } else {
      sheet.style.transform='';
    }
    moved=false;
  },{passive:true});
});

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

loadData();
</script>
