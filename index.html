<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>가계부</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-appearance:none;appearance:none}
a,button,input,select,textarea{font-family:'Pretendard',sans-serif;background:none;border:none;outline:none;-webkit-tap-highlight-color:transparent}
button{cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
html,body{height:100%;font-family:'Pretendard',sans-serif;background:#f0f2f8;overflow:hidden}
:root{
  --bg:#ffffff;--bg2:#f0f2f8;--bg3:#e8ebf4;
  --blue:#4361ee;--text:#0d0f1a;--text2:#5a607a;--text3:#9ba3bf;
  --income:#4361ee;--expense:#ff5c7c;--fixed:#0d0f1a;--savings:#00b894;
  --border:#e4e8f5;--shadow:0 2px 14px rgba(67,97,238,0.09);
}

/* ── 레이아웃 ── */
.app{
  width:100%;height:100%;max-width:430px;
  margin:0 auto;
  background:var(--bg2);
  /* position:relative 반드시 — FAB 기준점 */
  position:relative;
  overflow:hidden;
}
.main{position:absolute;inset:0;overflow:hidden;display:flex;flex-direction:column;transition:filter 0.3s ease}
.main.blurred{filter:blur(3px) brightness(0.85)}

/* ── 헤더 ── */
.header{padding:env(safe-area-inset-top,44px) 20px 12px;display:flex;align-items:center;justify-content:space-between;background:var(--bg2);flex-shrink:0}
.month-nav{display:flex;align-items:center;gap:4px}
.month-title{font-size:24px;font-weight:700;color:var(--text);cursor:pointer;padding:2px 4px;border-radius:8px}
.month-title:hover{background:var(--bg3)}
.nav-btn{font-size:14px;color:var(--text3);padding:4px 8px;border-radius:6px;transition:color 0.15s,background 0.15s}
.nav-btn.active{color:var(--blue);background:var(--bg3)}
.header-icons{display:flex;align-items:center;gap:2px}
.hicon{width:36px;height:36px;border-radius:10px;color:var(--text2);display:inline-flex;align-items:center;justify-content:center;transition:background 0.15s}
.hicon:hover{background:var(--bg3)}
.hicon svg{width:20px;height:20px;stroke:var(--text2);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ── 대시보드 ── */
.summary{margin:0 20px 10px;background:var(--bg);border-radius:18px;padding:12px 6px;display:grid;grid-template-columns:repeat(4,1fr);box-shadow:var(--shadow);flex-shrink:0}
.sum-item{text-align:center;cursor:pointer;padding:4px 2px;border-radius:10px;position:relative;outline:none;-webkit-tap-highlight-color:transparent}
.sum-item:focus{outline:none}
.sum-item:not(:last-child)::after{content:'';position:absolute;right:0;top:15%;height:70%;width:1px;background:var(--border)}
.sum-item:active{background:var(--bg2)}
.sum-label{font-size:10px;color:var(--text3);margin-bottom:3px;font-weight:500}
.sum-value{font-size:11px;font-weight:700}
.sum-value.income{color:var(--income)}.sum-value.expense{color:var(--expense)}.sum-value.fixed{color:var(--fixed)}.sum-value.savings{color:var(--savings)}

/* ── 캘린더 ── */
.cal-card{margin:0 20px 20px;background:var(--bg);border-radius:18px;padding:14px 12px;box-shadow:var(--shadow);flex:1;display:flex;flex-direction:column;min-height:0}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px;flex-shrink:0}
.cal-day-name{text-align:center;font-size:11px;font-weight:600;color:var(--text3);padding:2px 0}
.cal-day-name.sun{color:var(--expense)}.cal-day-name.sat{color:var(--blue)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);flex:1;align-content:start}
.cal-cell{padding:3px 1px;border-radius:8px;-webkit-user-select:none;user-select:none;cursor:pointer}
.cal-cell.empty{cursor:default;pointer-events:none}
.cal-cell.today .date-num{background:var(--blue);color:#fff;border-radius:50%}
.date-num{font-size:12px;color:var(--text);width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin:0 auto;font-weight:500}
.date-num.sun{color:var(--expense)}.date-num.sat{color:var(--blue)}
.cell-amount{font-size:9px;text-align:center;margin-top:3px;line-height:1.5;font-weight:600}
.cell-amount .neg{color:var(--expense)}.cell-amount .pos{color:var(--income)}

/* ── FAB ── */
/* .app 기준 absolute. z-index는 backdrop(10)보다 낮게 — 시트 닫혔을 때만 보임 */
.fab{
  position:absolute;
  bottom:calc(env(safe-area-inset-bottom,0px) + 44px);
  right:20px;
  width:52px;height:52px;
  background:var(--blue);border-radius:50%;
  color:#fff;font-size:28px;
  z-index:3;
  box-shadow:0 4px 20px rgba(67,97,238,0.4);
}
/* 세부내역 시트 열릴 때만 표시되는 FAB — sheet(11)보다 높게 */
.detail-fab{
  position:absolute;
  bottom:calc(env(safe-area-inset-bottom,0px) + 44px);
  right:20px;
  width:52px;height:52px;
  background:var(--blue);border-radius:50%;
  color:#fff;font-size:28px;
  z-index:13;
  box-shadow:0 4px 20px rgba(67,97,238,0.4);
  display:none;
}
.detail-fab.visible{display:inline-flex}

/* ── 배경 레이어 ── */
.dash-dim{position:absolute;top:0;left:0;right:0;height:130px;background:rgba(240,242,248,0);z-index:9;pointer-events:none;transition:background 0.3s ease}
.dash-dim.active{background:rgba(240,242,248,0.6)}
.backdrop{display:none;position:absolute;inset:0;background:rgba(13,15,26,0.3);z-index:10}
.backdrop.open{display:block}

/* ── 바텀시트 ── */
.sheet{position:absolute;bottom:-110%;left:0;right:0;background:var(--bg);border-radius:24px 24px 0 0;z-index:11;transition:bottom 0.35s cubic-bezier(0.32,0.72,0,1);min-height:70%}
.sheet.open{bottom:0}
/* sheet-inner: 좌우 28px — 버튼/필드가 모서리에서 충분히 떨어지게 */
.sheet-inner{padding:0 28px calc(env(safe-area-inset-bottom,0px)+80px);overflow-y:auto;max-height:75vh}
.sheet-top{padding:18px 0 0}
.handle{width:40px;height:4px;background:var(--bg3);border-radius:2px;margin:0 auto 18px}
.title-row{display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:20px}
.back-btn{position:absolute;left:0;font-size:22px;color:var(--blue);display:none;line-height:1}
.sheet-title{font-size:17px;font-weight:600;color:var(--text);text-align:center}

/* ── 스와이프 수정/삭제 ── */
.tx-wrap{position:relative;overflow:hidden;border-bottom:1px solid var(--bg3)}
.tx-wrap:last-child{border-bottom:none}
.tx-actions{position:absolute;right:0;top:0;bottom:0;display:flex;align-items:stretch}
.tx-action-btn{display:flex;align-items:center;justify-content:center;width:76px;font-size:14px;font-weight:600;color:#fff;cursor:pointer;flex-shrink:0}
.tx-action-btn.edit{background:#4361ee}
.tx-action-btn.del{background:#ff5c7c}
.tx-item{display:flex;justify-content:space-between;align-items:center;padding:14px 0;cursor:pointer;background:var(--bg);position:relative;transition:transform 0.25s ease;will-change:transform}
.tx-left{display:flex;align-items:center;gap:12px}
.tx-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tx-dot.income{background:var(--income)}.tx-dot.expense{background:var(--expense)}.tx-dot.fixed_expense{background:var(--fixed)}.tx-dot.savings{background:var(--savings)}
.tx-desc{font-size:14px;font-weight:500;color:var(--text)}
.tx-cat{font-size:11px;color:var(--text3);margin-top:2px}
.tx-amount{font-size:14px;font-weight:600;white-space:nowrap;margin-left:8px}
.tx-amount.expense{color:var(--expense)}.tx-amount.income{color:var(--income)}.tx-amount.savings{color:var(--savings)}.tx-amount.fixed_expense{color:var(--fixed)}

/* ── 입력 폼 ── */
.type-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
.type-tab{padding:11px 4px;border:1.5px solid var(--border);border-radius:12px;font-size:12px;text-align:center;color:var(--text2);font-weight:500;transition:all 0.15s}
.type-tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.form-group{margin-bottom:16px}
.form-label{font-size:12px;color:var(--text3);font-weight:500;margin-bottom:7px;display:block}
.form-group select,.form-group input{width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:12px;font-size:15px;background:var(--bg2);color:var(--text)}
.form-group select:focus,.form-group input:focus{border-color:var(--blue);background:var(--bg)}
.submit-btn{width:100%;padding:16px;background:var(--blue);color:#fff;border-radius:14px;font-size:16px;font-weight:600;box-shadow:0 4px 16px rgba(67,97,238,0.3);margin-top:8px;text-align:center;display:block}

/* ── 통계 ── */
.stat-bar-item{margin-bottom:14px;cursor:pointer;padding:8px;border-radius:12px;transition:background 0.15s}
.stat-bar-item:hover{background:var(--bg3)}
.stat-row{display:flex;justify-content:space-between;margin-bottom:6px;align-items:center}
.stat-label{font-size:13px;color:var(--text);font-weight:500}
.stat-pct{font-size:11px;color:var(--blue);font-weight:600;background:#eef0fd;padding:2px 7px;border-radius:20px;margin-left:6px}
.stat-amt{font-size:13px;color:var(--text2);font-weight:500}
.bar-track{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;background:var(--blue);border-radius:3px}
.stat-total{text-align:right;font-size:13px;color:var(--text2);margin-top:16px;padding-top:14px;border-top:1px solid var(--bg3)}
.stat-total span{color:var(--expense);font-weight:600}

/* ── 수정 시트 ── */
.edit-sheet{position:absolute;bottom:-110%;left:0;right:0;background:var(--bg);border-radius:24px 24px 0 0;z-index:22;transition:bottom 0.35s cubic-bezier(0.32,0.72,0,1);min-height:55%}
.edit-sheet.open{bottom:0}
.edit-inner{padding:18px 28px calc(env(safe-area-inset-bottom,0px)+36px);overflow-y:auto;max-height:70vh}

/* ── 검색 — 좌우 여백 충분히 ── */
.search-overlay{display:none;position:absolute;inset:0;background:var(--bg);z-index:15;flex-direction:column}
.search-overlay.open{display:flex}
.search-bar{
  display:flex;align-items:center;gap:12px;
  padding:calc(env(safe-area-inset-top,44px)+20px) 28px 16px;
  flex-shrink:0;
}
.search-input{flex:1;min-width:0;padding:13px 16px;border:1.5px solid var(--border);border-radius:12px;font-size:15px;background:var(--bg2);color:var(--text)}
.search-input:focus{border-color:var(--blue);background:var(--bg)}
.search-cancel{font-size:15px;color:var(--blue);white-space:nowrap;font-weight:500;flex-shrink:0}
/* 검색 결과: 좌우 28px — tx-item이 화면 끝에 닿지 않게 */
.search-results{flex:1;overflow-y:auto;padding:0 28px 20px}
.search-empty{text-align:center;color:var(--text3);font-size:13px;padding:60px 0}

/* ── 월 선택 바텀시트 ── */
.month-picker{
  position:absolute;bottom:-110%;left:0;right:0;
  background:var(--bg);border-radius:24px 24px 0 0;
  z-index:11;
  transition:bottom 0.35s cubic-bezier(0.32,0.72,0,1);
  min-height:48%;
}
.month-picker.open{bottom:0}
.month-picker-inner{
  /* 좌우 36px — 버튼이 화면 끝에서 충분히 떨어지게 */
  padding:18px 36px calc(env(safe-area-inset-bottom,0px)+32px);
}
/* 한 줄에 3개, 버튼 간격 충분히 */
.month-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
.month-btn{
  padding:18px 0;border-radius:14px;
  font-size:16px;font-weight:500;
  color:var(--text2);background:var(--bg2);
  text-align:center;transition:all 0.15s;
}
.month-btn.current{background:var(--blue);color:#fff;font-weight:700}
.month-btn:active{opacity:0.8}

.empty-msg{text-align:center;color:var(--text3);font-size:13px;padding:32px 0}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;z-index:99;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;font-weight:500}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="main" id="mainScreen">
    <div class="header">
      <div class="month-nav">
        <button class="nav-btn" id="prevM">‹</button>
        <span class="month-title" id="mTitle"></span>
        <button class="nav-btn" id="nextM">›</button>
      </div>
      <div class="header-icons">
        <button class="hicon" id="searchBtn" title="검색">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
        </button>
        <button class="hicon" id="statsBtn" title="통계">
          <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </button>
        <button class="hicon" id="navHome" title="오늘">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </button>
      </div>
    </div>

    <div class="summary">
      <div class="sum-item" id="dash-income" tabindex="-1"><div class="sum-label">수입</div><div class="sum-value income" id="sIncome">0원</div></div>
      <div class="sum-item" id="dash-expense" tabindex="-1"><div class="sum-label">지출</div><div class="sum-value expense" id="sExpense">0원</div></div>
      <div class="sum-item" id="dash-fixed" tabindex="-1"><div class="sum-label">고정지출</div><div class="sum-value fixed" id="sFixed">0원</div></div>

        <div class="cal-day-name">수</div><div class="cal-day-name">목</div><div class="cal-day-name">금</div>
        <div class="cal-day-name sat">토</div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>

  <!-- FAB: .app 직계 자식, .main 밖에 위치 -->
  <button class="fab" id="fabBtn">+</button>
  <button class="detail-fab" id="detailFabBtn">+</button>

  <div class="dash-dim" id="dashDim"></div>
  <div class="backdrop" id="backdrop"></div>

  <!-- 세부 내역 -->
  <div class="sheet" id="detailSheet">
    <div class="sheet-inner">
      <div class="sheet-top">
        <div class="handle"></div>
        <div class="title-row">
          <button class="back-btn" id="detailBackBtn">‹</button>
          <div class="sheet-title" id="detailTitle"></div>
        </div>
      </div>
      <div id="detailList"></div>
    </div>
  </div>

  <!-- 내역 기록 -->
  <div class="sheet" id="addSheet">
    <div class="sheet-inner">
      <div class="sheet-top">
        <div class="handle"></div>
        <div class="title-row"><div class="sheet-title">내역 기록하기</div></div>
      </div>
      <div class="type-tabs">
        <div class="type-tab active" data-type="income">수입</div>
        <div class="type-tab" data-type="expense">지출</div>
        <div class="type-tab" data-type="fixed_expense">고정지출</div>
        <div class="type-tab" data-type="savings">저축</div>
      </div>
      <div class="form-group" id="catGroup" style="display:none">
        <label class="form-label">카테고리</label>
        <select id="catInput"><option value="">분류 선택</option><option>식비</option><option>쇼핑</option><option>생필품</option><option>문화</option><option>주유비</option><option>교통/차량</option><option>의료비</option><option>경조사/선물</option><option>여행</option><option>숙박</option><option>기타</option></select>
      </div>
      <div class="form-group"><label class="form-label">금액</label><input type="text" id="amtInput" placeholder="0" inputmode="numeric"></div>
      <div class="form-group"><label class="form-label">내용</label><input type="text" id="descInput" placeholder="어디에 썼나요?"></div>
      <div class="form-group"><label class="form-label">날짜</label><input type="date" id="dateInput"></div>
      <button class="submit-btn" id="submitBtn">기록하기</button>
    </div>
  </div>

  <!-- 통계 -->
  <div class="sheet" id="statsSheet">
    <div class="sheet-inner">
      <div class="sheet-top">
        <div class="handle"></div>
        <div class="title-row"><div class="sheet-title" id="statsTitle"></div></div>
      </div>
      <div id="statContent"></div>
    </div>
  </div>

  <!-- 수정 시트 -->
  <div class="edit-sheet" id="editSheet">
    <div class="edit-inner">
      <div class="sheet-top">
        <div class="handle"></div>
        <div class="title-row"><div class="sheet-title">내역 수정하기</div></div>
      </div>
      <div class="form-group" id="editCatGroup"><label class="form-label">카테고리</label>
        <select id="editCatInput"><option value="">분류 선택</option><option>식비</option><option>쇼핑</option><option>생필품</option><option>문화</option><option>주유비</option><option>교통/차량</option><option>의료비</option><option>경조사/선물</option><option>여행</option><option>숙박</option><option>기타</option></select>
      </div>
      <div class="form-group"><label class="form-label">금액</label><input type="text" id="editAmtInput" placeholder="0" inputmode="numeric"></div>
      <div class="form-group"><label class="form-label">내용</label><input type="text" id="editDescInput" placeholder="내용"></div>
      <div class="form-group"><label class="form-label">날짜</label><input type="date" id="editDateInput"></div>
      <button class="submit-btn" id="editSubmitBtn">수정 완료</button>
    </div>
  </div>

  <div class="backdrop" id="editBackdrop" style="z-index:19;display:none"></div>

  <!-- 월 선택 — inner div로 좌우 여백 제어 -->
  <div class="month-picker" id="monthPicker">
    <div class="month-picker-inner">
      <div class="handle"></div>
      <div class="title-row"><div class="sheet-title" id="monthPickerTitle"></div></div>
      <div class="month-grid" id="monthGrid"></div>
    </div>
  </div>

  <!-- 검색 -->
  <div class="search-overlay" id="searchOverlay">
    <div class="search-bar">
      <input class="search-input" id="searchInput" placeholder="내역 검색...">
      <button class="search-cancel" id="searchCancel">취소</button>
    </div>
    <div class="search-results" id="searchResults"><div class="search-empty">검색어를 입력해주세요</div></div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
const SUPABASE_URL='https://mqqpuhpjvhqbicnlycrh.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xcXB1aHBqdmhxYmljbmx5Y3JoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NTg5NTEsImV4cCI6MjA5MjMzNDk1MX0.eDwMcmTl861SLHZLSnyWbVDoI87cWw_aI3onj99F37s';

const now=new Date();
let year=now.getFullYear(),month=now.getMonth();
let selType='income',selectedTxId=null,prevSheet=null;
let txs=[],currentDetailDate=null;
const fmt=n=>Math.abs(n).toLocaleString('ko-KR')+'원';
const pd=n=>String(n).padStart(2,'0');
const typeLabel={income:'수입',expense:'지출',fixed_expense:'고정지출',savings:'저축'};

async function loadData(){
  try{
    const r=await fetch(SUPABASE_URL+'/rest/v1/transactions?order=date.asc&limit=1000',{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
    txs=await r.json();
  }catch(e){console.error(e);}
  render();
}
async function saveData(data){
  const r=await fetch(SUPABASE_URL+'/rest/v1/transactions',{method:'POST',headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify(data)});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function updateData(id,data){
  const r=await fetch(SUPABASE_URL+'/rest/v1/transactions?id=eq.'+id,{method:'PATCH',headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'},body:JSON.stringify(data)});
  if(!r.ok)throw new Error(await r.text());
}
async function deleteData(id){
  await fetch(SUPABASE_URL+'/rest/v1/transactions?id=eq.'+id,{method:'DELETE',headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
}

function monthTxs(){return txs.filter(t=>{const d=new Date(t.date);return d.getFullYear()===year&&d.getMonth()===month;});}

function render(){
  const mt=monthTxs();
  const sum=type=>mt.filter(t=>t.type===type).reduce((s,t)=>s+t.amount,0);
  document.getElementById('mTitle').textContent=(month+1)+'월';
  document.getElementById('sIncome').textContent=fmt(sum('income'));
  document.getElementById('sExpense').textContent=fmt(sum('expense'));
  document.getElementById('sFixed').textContent=fmt(sum('fixed_expense'));
  document.getElementById('sSavings').textContent=fmt(sum('savings'));
  renderCal();
}

function renderCal(){
  const g=document.getElementById('calGrid');g.innerHTML='';
  const first=new Date(year,month,1).getDay();
  const days=new Date(year,month+1,0).getDate();
  const weeks=Math.ceil((first+days)/7);
  const today=new Date();
  g.style.gridTemplateRows=`repeat(${weeks},1fr)`;
  for(let i=0;i<first;i++){const c=document.createElement('div');c.className='cal-cell empty';g.appendChild(c);}
  for(let d=1;d<=days;d++){
    const c=document.createElement('div');c.className='cal-cell';
    const dow=(first+d-1)%7;
    if(today.getFullYear()===year&&today.getMonth()===month&&today.getDate()===d)c.classList.add('today');
    const dn=document.createElement('div');
    dn.className='date-num'+(dow===0?' sun':dow===6?' sat':'');
    dn.textContent=d;c.appendChild(dn);
    const ds=year+'-'+pd(month+1)+'-'+pd(d);
    const dayTx=txs.filter(t=>t.date===ds);
    if(dayTx.length){
      const inc=dayTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
      const out=dayTx.filter(t=>t.type!=='income').reduce((s,t)=>s+t.amount,0);
      const a=document.createElement('div');a.className='cell-amount';
      // 금액을 그대로 쉼표 형식으로 표기
      if(inc){const s=document.createElement('div');s.className='pos';s.textContent='+'+inc.toLocaleString('ko-KR');a.appendChild(s);}
      if(out){const s=document.createElement('div');s.className='neg';s.textContent='-'+out.toLocaleString('ko-KR');a.appendChild(s);}
      c.appendChild(a);
    }
    let tSX=0,tSY=0,tMoved=false;
    c.addEventListener('touchstart',e=>{tSX=e.touches[0].clientX;tSY=e.touches[0].clientY;tMoved=false;},{passive:true});
    c.addEventListener('touchmove',e=>{if(Math.abs(e.touches[0].clientX-tSX)>12||Math.abs(e.touches[0].clientY-tSY)>12)tMoved=true;},{passive:true});
    c.addEventListener('touchend',e=>{if(!tMoved){e.preventDefault();showDetail(d+'일 세부 내역',dayTx,null,ds);}},{passive:false});
    c.addEventListener('click',()=>showDetail(d+'일 세부 내역',dayTx,null,ds));
    g.appendChild(c);
  }
}

function setBlur(on){
  document.getElementById('mainScreen').classList.toggle('blurred',on);
  document.getElementById('dashDim').classList.toggle('active',on);
  document.getElementById('backdrop').classList.toggle('open',on);
}

function showDetailFab(show){
  document.getElementById('detailFabBtn').classList.toggle('visible',show);
  // 홈 FAB는 시트 열릴 때 backdrop 뒤로 가서 자연스럽게 가려짐
  // display 조작 없이 z-index로만 처리
}

function openSheet(id,fromSheet=null){
  prevSheet=fromSheet;
  document.querySelectorAll('.sheet').forEach(s=>{if(s.id!==id)s.classList.remove('open');});
  setBlur(true);
  const inner=document.getElementById(id).querySelector('.sheet-inner,.edit-inner');
  if(inner)inner.scrollTop=0;
  setTimeout(()=>document.getElementById(id).classList.add('open'),10);
  const bb=document.getElementById('detailBackBtn');
  if(bb)bb.style.display=fromSheet?'inline-flex':'none';
  showDetailFab(id==='detailSheet');
}

function closeAll(){
  document.querySelectorAll('.sheet,.month-picker').forEach(s=>s.classList.remove('open'));
  setBlur(false);
  document.getElementById('editBackdrop').classList.remove('open');
  document.getElementById('editBackdrop').style.display='none';
  prevSheet=null;
  currentDetailDate=null;
  showDetailFab(false);
}

function makeTxList(txList,listEl){
  if(!txList.length){listEl.innerHTML='<div class="empty-msg">내역이 없어요</div>';return;}
  listEl.innerHTML='';
  let openedItem=null;
  const SNAP=152;
  txList.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(t=>{
    const wrap=document.createElement('div');wrap.className='tx-wrap';
    const actions=document.createElement('div');actions.className='tx-actions';
    const editBtn=document.createElement('div');editBtn.className='tx-action-btn edit';editBtn.textContent='수정';
    const delBtn=document.createElement('div');delBtn.className='tx-action-btn del';delBtn.textContent='삭제';
    actions.appendChild(editBtn);actions.appendChild(delBtn);
    wrap.appendChild(actions);
    const item=document.createElement('div');item.className='tx-item';
    item.innerHTML=`<div class="tx-left"><div class="tx-dot ${t.type}"></div><div><div class="tx-desc">${t.description||'-'}</div><div class="tx-cat">${t.date.slice(5).replace('-','/')}일 · ${t.category||typeLabel[t.type]}</div></div></div><div class="tx-amount ${t.type}">${fmt(t.amount)}</div>`;
    wrap.appendChild(item);
    editBtn.addEventListener('click',()=>{item.style.transform='';openedItem=null;openEditSheet(t);});
    delBtn.addEventListener('click',async()=>{
      try{
        await deleteData(t.id);txs=txs.filter(x=>x.id!==t.id);wrap.remove();
        if(currentDetailDate&&!txs.filter(x=>x.date===currentDetailDate).length)listEl.innerHTML='<div class="empty-msg">내역이 없어요</div>';
        render();showToast('삭제되었습니다');
      }catch(e){showToast('삭제 실패');}
    });
    let sx=0,sy=0,dx=0,swiping=false,itemOpen=false;
    item.addEventListener('touchstart',e=>{
      if(openedItem&&openedItem!==item){openedItem.style.transition='transform 0.25s ease';openedItem.style.transform='';openedItem=null;}
      sx=e.touches[0].clientX;sy=e.touches[0].clientY;dx=0;swiping=false;item.style.transition='none';
    },{passive:true});
    item.addEventListener('touchmove',e=>{
      const curDx=e.touches[0].clientX-sx;
      const curDy=Math.abs(e.touches[0].clientY-sy);
      if(!swiping&&curDy>Math.abs(curDx))return;
      swiping=true;
      dx=Math.max(-SNAP,Math.min(0,itemOpen?curDx-SNAP:curDx));
      item.style.transform=`translateX(${dx}px)`;
    },{passive:true});
    item.addEventListener('touchend',()=>{
      item.style.transition='transform 0.25s ease';
      if(swiping){
        if(dx<-SNAP/2){item.style.transform=`translateX(-${SNAP}px)`;openedItem=item;itemOpen=true;}
        else{item.style.transform='';openedItem=null;itemOpen=false;}
      }else{
        if(itemOpen){item.style.transform='';openedItem=null;itemOpen=false;}
      }
      swiping=false;
    },{passive:true});
    listEl.appendChild(wrap);
  });
}

function openEditSheet(t){
  selectedTxId=t.id;
  document.getElementById('editAmtInput').value=t.amount.toLocaleString('ko-KR');
  document.getElementById('editDescInput').value=t.description||'';
  document.getElementById('editDateInput').value=t.date;
  document.getElementById('editCatInput').value=t.category||'';
  document.getElementById('editCatGroup').style.display=t.type==='expense'?'block':'none';
  document.getElementById('editBackdrop').style.display='block';
  setTimeout(()=>{document.getElementById('editBackdrop').classList.add('open');document.getElementById('editSheet').classList.add('open');},10);
}

function showDetail(title,txList,fromSheet,dateStr){
  currentDetailDate=dateStr||null;
  document.getElementById('detailTitle').textContent=title;
  makeTxList(txList,document.getElementById('detailList'));
  openSheet('detailSheet',fromSheet);
}
function showDashDetail(type){
  const labels={income:'수입 내역',expense:'지출 내역',fixed_expense:'고정지출 내역',savings:'저축 내역'};
  const mt=monthTxs().filter(t=>t.type===type).sort((a,b)=>a.date.localeCompare(b.date));
  showDetail((month+1)+'월 '+labels[type],mt,null,null);
}
function showStats(){
  const mt=monthTxs();
  const expenses=mt.filter(t=>t.type==='expense'||t.type==='fixed_expense');
  const total=expenses.reduce((s,t)=>s+t.amount,0);
  const cats={};
  expenses.forEach(t=>{const k=t.category||(t.type==='fixed_expense'?'고정지출':'기타');cats[k]=(cats[k]||0)+t.amount;});
  const sorted=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  document.getElementById('statsTitle').textContent=(month+1)+'월 지출 분석';
  const cont=document.getElementById('statContent');cont.innerHTML='';
  if(!sorted.length){cont.innerHTML='<div class="empty-msg">지출 내역이 없어요</div>';openSheet('statsSheet',null);return;}
  sorted.forEach(([cat,amt])=>{
    const pct=Math.round(amt/total*100);
    const el=document.createElement('div');el.className='stat-bar-item';
    el.innerHTML=`<div class="stat-row"><span class="stat-label">${cat}<span class="stat-pct">${pct}%</span></span><span class="stat-amt">${fmt(amt)}</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>`;
    el.addEventListener('click',()=>{
      const catTxs=monthTxs().filter(t=>t.category===cat||(cat==='고정지출'&&t.type==='fixed_expense'&&!t.category)).sort((a,b)=>a.date.localeCompare(b.date));
      showDetail(cat+' 내역',catTxs,'statsSheet',null);
    });
    cont.appendChild(el);
  });
  const te=document.createElement('div');te.className='stat-total';te.innerHTML=`총 지출 합계: <span>${fmt(total)}</span>`;cont.appendChild(te);
  openSheet('statsSheet',null);
}

function showMonthPicker(){
  const grid=document.getElementById('monthGrid');
  document.getElementById('monthPickerTitle').textContent=year+'년';
  grid.innerHTML='';
  for(let m=0;m<12;m++){
    const btn=document.createElement('div');btn.className='month-btn'+(m===month?' current':'');
    btn.textContent=(m+1)+'월';
    btn.addEventListener('click',()=>{month=m;closeMonthPicker();render();});
    grid.appendChild(btn);
  }
  setBlur(true);
  setTimeout(()=>document.getElementById('monthPicker').classList.add('open'),10);
}
function closeMonthPicker(){document.getElementById('monthPicker').classList.remove('open');setBlur(false);}

document.getElementById('mTitle').addEventListener('click',showMonthPicker);
document.getElementById('backdrop').addEventListener('click',()=>{

  closeAll();
});

document.getElementById('detailBackBtn').addEventListener('click',()=>{
  document.getElementById('detailSheet').classList.remove('open');
  showDetailFab(false);
  if(prevSheet){setTimeout(()=>{document.getElementById(prevSheet).classList.add('open');document.getElementById('detailBackBtn').style.display='none';prevSheet=null;},10);}
});

  document.querySelectorAll('.type-tab').forEach(t=>t.classList.toggle('active',t.dataset.type==='income'));
  document.getElementById('catGroup').style.display='none';
  document.getElementById('amtInput').value='';document.getElementById('descInput').value='';document.getElementById('catInput').value='';

function closeEditSheet(){
  document.getElementById('editSheet').classList.remove('open');
  document.getElementById('editBackdrop').classList.remove('open');

}
document.getElementById('editBackdrop').addEventListener('click',closeEditSheet);
document.getElementById('editSubmitBtn').addEventListener('click',async()=>{
  const tx=txs.find(t=>t.id===selectedTxId);if(!tx)return;
  const amount=parseInt(document.getElementById('editAmtInput').value.replace(/,/g,''));
  if(!amount||amount<=0){showToast('금액을 입력해주세요');return;}
  const updData={amount,description:document.getElementById('editDescInput').value.trim(),date:document.getElementById('editDateInput').value};
  if(tx.type==='expense')updData.category=document.getElementById('editCatInput').value;
  try{
    await updateData(selectedTxId,updData);Object.assign(tx,updData);closeEditSheet();
    if(document.getElementById('detailSheet').classList.contains('open')&&currentDetailDate){
      makeTxList(txs.filter(t=>t.date===currentDetailDate),document.getElementById('detailList'));
    }
    render();showToast('✓ 수정되었습니다');
  }catch(e){showToast('수정 실패');}
});

function fmtInput(el){el.addEventListener('input',()=>{const raw=el.value.replace(/,/g,'').replace(/\D/g,'');el.value=raw?parseInt(raw).toLocaleString('ko-KR'):'';});}
fmtInput(document.getElementById('amtInput'));fmtInput(document.getElementById('editAmtInput'));

document.getElementById('searchBtn').addEventListener('click',()=>{document.getElementById('searchOverlay').classList.add('open');setTimeout(()=>document.getElementById('searchInput').focus(),100);});
document.getElementById('searchCancel').addEventListener('click',()=>{document.getElementById('searchOverlay').classList.remove('open');document.getElementById('searchInput').value='';document.getElementById('searchResults').innerHTML='<div class="search-empty">검색어를 입력해주세요</div>';});
document.getElementById('searchInput').addEventListener('input',()=>{
  const q=document.getElementById('searchInput').value.trim();
  const res=document.getElementById('searchResults');
  if(!q){res.innerHTML='<div class="search-empty">검색어를 입력해주세요</div>';return;}
  const found=txs.filter(t=>(t.description||'').includes(q)||(t.category||'').includes(q));
  if(!found.length){res.innerHTML='<div class="search-empty">검색 결과가 없어요</div>';return;}
  res.innerHTML='';
  found.sort((a,b)=>a.date.localeCompare(b.date)).forEach(t=>{
    const wrap=document.createElement('div');wrap.className='tx-wrap';
    const item=document.createElement('div');item.className='tx-item';
    item.innerHTML=`<div class="tx-left"><div class="tx-dot ${t.type}"></div><div><div class="tx-desc">${t.description||'-'}</div><div class="tx-cat">${t.date.slice(0,7).replace('-','/')} · ${t.category||typeLabel[t.type]}</div></div></div><div class="tx-amount ${t.type}">${fmt(t.amount)}</div>`;
    wrap.appendChild(item);res.appendChild(wrap);
  });
});

document.getElementById('navHome').addEventListener('click',()=>{year=now.getFullYear();month=now.getMonth();render();closeAll();});
document.getElementById('statsBtn').addEventListener('click',showStats);
document.getElementById('fabBtn').addEventListener('click',()=>openAddSheet(null));

document.querySelectorAll('.type-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.type-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');selType=tab.dataset.type;
    document.getElementById('catGroup').style.display=selType==='expense'?'block':'none';
  });
});

document.getElementById('submitBtn').addEventListener('click',async()=>{
  const amount=parseInt(document.getElementById('amtInput').value.replace(/,/g,''));
  const desc=document.getElementById('descInput').value.trim();
  const date=document.getElementById('dateInput').value;
  const category=document.getElementById('catInput').value;
  if(!amount||amount<=0){showToast('금액을 입력해주세요');return;}
  if(!date){showToast('날짜를 선택해주세요');return;}
  if(selType==='expense'&&!category){showToast('카테고리를 선택해주세요');return;}
  const btn=document.getElementById('submitBtn');btn.textContent='저장 중...';btn.disabled=true;
  try{
    const res=await saveData({type:selType,amount,description:desc,date,category:selType==='expense'?category:null});
    const newTx=Array.isArray(res)?res[0]:res;txs.push(newTx);
    if(prevSheet==='detailSheet'&&currentDetailDate&&date===currentDetailDate){
      makeTxList(txs.filter(t=>t.date===currentDetailDate),document.getElementById('detailList'));
      document.getElementById('addSheet').classList.remove('open');
      document.getElementById('detailSheet').classList.add('open');
      showDetailFab(true);
    }else{closeAll();}
    render();showToast('✓ 기록되었습니다');
  }catch(e){showToast('저장 실패: '+e.message);}
  finally{btn.textContent='기록하기';btn.disabled=false;}
});

['dash-income','dash-expense','dash-fixed','dash-savings'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(){this.blur();});
});
document.getElementById('dash-income').addEventListener('click',()=>showDashDetail('income'));
document.getElementById('dash-expense').addEventListener('click',()=>showDashDetail('expense'));
document.getElementById('dash-fixed').addEventListener('click',()=>showDashDetail('fixed_expense'));

function flashNav(dir){
  const btn=document.getElementById(dir==='prev'?'prevM':'nextM');
  btn.classList.add('active');setTimeout(()=>btn.classList.remove('active'),300);
}
document.getElementById('prevM').addEventListener('click',()=>{month--;if(month<0){month=11;year--;}flashNav('prev');render();});
document.getElementById('nextM').addEventListener('click',()=>{month++;if(month>11){month=0;year++;}flashNav('next');render();});

let swSX=0,swSY=0,swMoved=false;
document.getElementById('mainScreen').addEventListener('touchstart',e=>{swSX=e.touches[0].clientX;swSY=e.touches[0].clientY;swMoved=false;},{passive:true});
document.getElementById('mainScreen').addEventListener('touchmove',()=>{swMoved=true;},{passive:true});
document.getElementById('mainScreen').addEventListener('touchend',e=>{
  if(!swMoved)return;
  const dx=e.changedTouches[0].clientX-swSX;
  const dy=Math.abs(e.changedTouches[0].clientY-swSY);
  if(Math.abs(dx)>60&&dy<40){
    if(dx<0){month++;if(month>11){month=0;year++;}flashNav('next');}
    else{month--;if(month<0){month=11;year--;}flashNav('prev');}
    render();
  }
},{passive:true});

// 바텀시트 드래그 닫기 — 부드러운 spring
document.querySelectorAll('.sheet,.month-picker').forEach(sheet=>{
  let sy=0,dragging=false,dy=0,velocity=0,lastY=0,lastTime=0;
  sheet.addEventListener('touchstart',e=>{
    if(e.target.closest('.tx-item,.tx-action-btn,.type-tab,.submit-btn,.form-group,.month-btn,.back-btn'))return;
    const inner=e.target.closest('.sheet-inner');
    if(inner&&inner.scrollTop>0)return;
    sy=e.touches[0].clientY;dy=0;velocity=0;lastY=sy;lastTime=Date.now();
    dragging=true;
    sheet.style.transition='none';
    sheet.style.bottom='0';
  },{passive:true});
  sheet.addEventListener('touchmove',e=>{
    if(!dragging)return;
    const d=e.touches[0].clientY-sy;
    if(d>0){
      const now2=Date.now();
      velocity=(e.touches[0].clientY-lastY)/(now2-lastTime+1)*16;
      lastY=e.touches[0].clientY;lastTime=now2;
      dy=d;
      const dampedD=Math.sqrt(d)*4.5;
      sheet.style.bottom=(-dampedD)+'px';
    }
  },{passive:true});
  sheet.addEventListener('touchend',()=>{
    if(!dragging)return;
    dragging=false;
    if(dy>100||velocity>2){
      sheet.style.transition='bottom 0.35s cubic-bezier(0.32,0.72,0,1)';
      sheet.style.bottom='';
      if(sheet.classList.contains('month-picker')){closeMonthPicker();}
      else{closeAll();}
    }else{
      sheet.style.transition='bottom 0.4s cubic-bezier(0.34,1.56,0.64,1)';
      sheet.style.bottom='0';
      sheet.addEventListener('transitionend',()=>{sheet.style.transition='';sheet.style.bottom='';},{once:true});
    }
    dy=0;velocity=0;
  },{passive:true});
});

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
